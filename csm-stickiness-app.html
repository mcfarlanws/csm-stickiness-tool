<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pillars of Stickiness</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fafafa;
    --bg-panel: #ffffff;
    --bg-surface: #f4f4f2;
    --text: #1a1a1a;
    --text-muted: #6b6b6b;
    --border: rgba(0,0,0,0.1);
    --border-mid: rgba(0,0,0,0.18);
    --accent: #3C3489;
    --accent-light: #EEEDFE;
    --accent-text: #26215C;
    --teal: #0F6E56;
    --teal-light: #E1F5EE;
    --teal-text: #04342C;
    --coral: #993C1D;
    --coral-light: #FAECE7;
    --coral-text: #4A1B0C;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg-panel: #242424;
      --bg-surface: #2c2c2a;
      --text: #f0ede8;
      --text-muted: #9a9892;
      --border: rgba(255,255,255,0.08);
      --border-mid: rgba(255,255,255,0.15);
      --accent: #AFA9EC;
      --accent-light: #3C3489;
      --accent-text: #EEEDFE;
      --teal: #5DCAA5;
      --teal-light: #085041;
      --teal-text: #E1F5EE;
      --coral: #F0997B;
      --coral-light: #712B13;
      --coral-text: #FAECE7;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 14px 24px;
    border-bottom: 0.5px solid var(--border);
    background: var(--bg-panel);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  header .logo {
    width: 28px; height: 28px;
    background: var(--accent-light);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
  }

  header .logo svg { width: 16px; height: 16px; }

  header h1 { font-size: 15px; font-weight: 500; color: var(--text); }
  header p  { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

  .workspace {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .chat-panel {
    width: 420px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    border-right: 0.5px solid var(--border);
    background: var(--bg-panel);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    display: flex;
    gap: 10px;
    max-width: 100%;
  }

  .msg.user { flex-direction: row-reverse; }

  .msg .avatar {
    width: 28px; height: 28px; border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
    margin-top: 2px;
  }

  .msg.assistant .avatar { background: var(--accent-light); color: var(--accent-text); }
  .msg.user .avatar { background: var(--bg-surface); color: var(--text-muted); }

  .bubble {
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    max-width: 320px;
  }

  .msg.assistant .bubble {
    background: var(--bg-surface);
    color: var(--text);
    border-radius: 4px 14px 14px 14px;
  }

  .msg.user .bubble {
    background: var(--accent-light);
    color: var(--accent-text);
    border-radius: 14px 4px 14px 14px;
  }

  .typing { display: flex; gap: 4px; padding: 4px 0; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

  .input-area {
    padding: 12px 16px;
    border-top: 0.5px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  .input-area textarea {
    flex: 1;
    resize: none;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 42px;
    max-height: 120px;
    outline: none;
  }

  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-muted); }

  .send-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .infographic-panel {
    flex: 1;
    overflow-y: auto;
    padding: 32px 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .infographic-header {
    text-align: center;
  }

  .infographic-header .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .infographic-header .customer-name {
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
  }

  .infographic-header .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    opacity: 0.45;
    text-align: center;
  }

  .empty-state svg { width: 40px; height: 40px; }
  .empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.5; max-width: 240px; }

  .pillars-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .pillar-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg-panel);
    transition: opacity 0.3s;
    min-height: 200px;
  }

  .pillar-card.empty {
    border-style: dashed;
    opacity: 0.4;
    justify-content: center;
    align-items: center;
  }

  .pillar-card.empty .placeholder-num {
    font-size: 28px;
    font-weight: 500;
    color: var(--text-muted);
    opacity: 0.4;
  }

  .pillar-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
  }

  .pillar-icon svg { width: 18px; height: 18px; }

  .pillar-card.p1 .pillar-icon { background: var(--accent-light); }
  .pillar-card.p1 .pillar-icon svg { stroke: var(--accent); }
  .pillar-card.p2 .pillar-icon { background: var(--teal-light); }
  .pillar-card.p2 .pillar-icon svg { stroke: var(--teal); }
  .pillar-card.p3 .pillar-icon { background: var(--coral-light); }
  .pillar-card.p3 .pillar-icon svg { stroke: var(--coral); }

  .pillar-card.p1 .pillar-num { color: var(--accent); }
  .pillar-card.p2 .pillar-num { color: var(--teal); }
  .pillar-card.p3 .pillar-num { color: var(--coral); }

  .pillar-num { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  .pillar-title { font-size: 15px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .pillar-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; flex: 1; }

  .evidence-list { display: flex; flex-direction: column; gap: 5px; margin-top: 4px; }
  .evidence-item {
    font-size: 12px;
    color: var(--text-muted);
    padding-left: 12px;
    position: relative;
    line-height: 1.45;
  }
  .evidence-item::before {
    content: '';
    position: absolute;
    left: 0; top: 7px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text-muted);
    opacity: 0.5;
  }

  .pillar-card.p1 .evidence-item::before { background: var(--accent); opacity: 0.6; }
  .pillar-card.p2 .evidence-item::before { background: var(--teal); opacity: 0.6; }
  .pillar-card.p3 .evidence-item::before { background: var(--coral); opacity: 0.6; }

  .divider { height: 0.5px; background: var(--border); }

  .summary-card {
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    background: var(--bg-panel);
  }

  .summary-card h3 { font-size: 13px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .summary-card p { font-size: 14px; color: var(--text); line-height: 1.65; }

  .export-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 20px;
    border: 0.5px solid var(--border-mid);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    align-self: flex-end;
    transition: background 0.15s;
  }
  .export-btn:hover { background: var(--bg-surface); }

  .progress-bar {
    height: 3px;
    background: var(--bg-surface);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .step-indicator {
    display: flex; gap: 6px; justify-content: center;
  }
  .step-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border-mid);
    transition: background 0.3s;
  }
  .step-dot.active { background: var(--accent); }

  @media (max-width: 760px) {
    .workspace { flex-direction: column; }
    .chat-panel { width: 100%; height: 55vh; border-right: none; border-bottom: 0.5px solid var(--border); }
    .pillars-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="11" width="4" height="4" rx="1" fill="#3C3489"/>
      <rect x="6" y="7" width="4" height="8" rx="1" fill="#0F6E56"/>
      <rect x="11" y="3" width="4" height="12" rx="1" fill="#993C1D"/>
    </svg>
  </div>
  <div>
    <h1>Pillars of Stickiness</h1>
    <p>Customer Success Intelligence</p>
  </div>
</header>

<div class="workspace">

  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="userInput" placeholder="Type your response…" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 12V2M7 2L2.5 6.5M7 2L11.5 6.5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="infographic-panel" id="infographicPanel">
    <div class="empty-state" id="emptyState">
      <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="28" width="8" height="8" rx="2" fill="currentColor" opacity="0.3"/>
        <rect x="16" y="20" width="8" height="16" rx="2" fill="currentColor" opacity="0.5"/>
        <rect x="28" y="12" width="8" height="24" rx="2" fill="currentColor" opacity="0.7"/>
      </svg>
      <p>Your stickiness pillars will appear here as we discover them together.</p>
    </div>
  </div>

</div>

<script>
const SYSTEM_PROMPT = `You are a Customer Success Management coach helping a CSM identify three "Pillars of Stickiness" for their product with a specific customer. These pillars represent the core reasons why the customer is deeply reliant on and loyal to the product.

SEEDED CATEGORIES TO GUIDE TOWARD (but let the conversation flow naturally):
1. IFS as an ERP — using IFS as the core enterprise resource planning backbone across the business
2. PSO Management — professional services operations managed end-to-end within the platform
3. Internal Process Automation — key internal workflows automated through the product
4. Value Realization — quantifiable business outcomes or ROI the customer has achieved
5. Workflow Integration — how deeply embedded the product is in daily processes
6. Champion & Relationships — key internal advocates and relationship strength
7. Risk & Switching Cost — what it would cost or risk for them to leave
8. Strategic Alignment — how aligned the product roadmap is with their strategic goals
9. Data & Reporting Centralization — single source of truth for operational or financial data
10. Regulatory & Compliance Enablement — product helps meet industry or regulatory requirements
11. Multi-site or Global Rollout — deployed across multiple sites, regions, or business units
12. Customer-Facing Operations — product powers services or experiences delivered to their own customers

YOUR ROLE:
- Ask one focused question at a time
- Be conversational and warm, not clinical
- Help the CSM articulate vague feelings into concrete evidence
- Guide toward identifying 3 clear pillars, each with a title, a one-sentence description, and 2-3 bullet points of evidence
- Once you have enough for a pillar, extract it and continue toward the next

RESPONSE FORMAT:
Always respond in valid JSON with this structure:
{
  "message": "Your conversational reply to the CSM (markdown allowed, but keep it concise)",
  "pillars": [
    {
      "id": 1,
      "title": "Short pillar name (3-5 words)",
      "description": "One clear sentence describing why this creates stickiness",
      "evidence": ["Evidence point 1", "Evidence point 2", "Evidence point 3"]
    }
  ],
  "customerName": "Company name if mentioned, else null",
  "overallSummary": "2-3 sentence narrative summary of the customer relationship. Only include when all 3 pillars are identified, else null.",
  "phase": "gathering|building|complete"
}

Only include pillars that are sufficiently identified. Start with an empty array. Add pillars as they emerge. Keep evidence points under 12 words each.

Start by warmly welcoming the CSM and asking for the customer's name and what product they are selling.`;

let conversationHistory = [];
let pillarsData = [];
let customerName = null;
let isLoading = false;
let appStarted = false;

const messagesEl = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const infographicPanel = document.getElementById('infographicPanel');

const PILLAR_ICONS = [
  `<svg viewBox="0 0 18 18" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2l2 4.5L16 7.27l-3.5 3.41.83 4.82L9 13.27l-4.33 2.23.83-4.82L2 7.27l5-.77L9 2z"/></svg>`,
  `<svg viewBox="0 0 18 18" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9a6 6 0 0112 0"/><path d="M3 9H1m16 0h-2M9 3V1m0 16v-2"/><circle cx="9" cy="9" r="2"/></svg>`,
  `<svg viewBox="0 0 18 18" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 11c0 2.21-3.13 4-7 4s-7-1.79-7-4"/><path d="M16 7c0 2.21-3.13 4-7 4S2 9.21 2 7c0-2.21 3.13-4 7-4s7 1.79 7 4z"/></svg>`
];

const PILLAR_CLASSES = ['p1', 'p2', 'p3'];
const PILLAR_LABELS = ['Pillar 01', 'Pillar 02', 'Pillar 03'];

function scrollMessages() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const initials = role === 'assistant' ? 'AI' : 'ME';
  div.innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
  `;
  messagesEl.appendChild(div);
  scrollMessages();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = `<div class="avatar">AI</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(div);
  scrollMessages();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function updateInfoGraphic() {
  const emptyState = document.getElementById('emptyState');
  if (emptyState) emptyState.remove();

  let existing = document.getElementById('infographic-content');
  if (!existing) {
    existing = document.createElement('div');
    existing.id = 'infographic-content';
    existing.style.cssText = 'display:flex;flex-direction:column;gap:24px;width:100%;';
    infographicPanel.appendChild(existing);
  }

  const completedCount = pillarsData.length;
  const progress = Math.round((completedCount / 3) * 100);

  let headerHTML = `
    <div class="infographic-header">
      <span class="tag">Pillars of Stickiness</span>
      <div class="customer-name">${customerName || 'Your Customer'}</div>
      <div class="subtitle">${completedCount} of 3 pillars identified</div>
      <div class="progress-bar" style="max-width:160px;margin:10px auto 0;">
        <div class="progress-fill" style="width:${progress}%"></div>
      </div>
    </div>
  `;

  let pillarsHTML = '<div class="pillars-grid">';
  for (let i = 0; i < 3; i++) {
    const p = pillarsData[i];
    if (p) {
      const evidenceItems = p.evidence.map(e => `<div class="evidence-item">${e}</div>`).join('');
      pillarsHTML += `
        <div class="pillar-card ${PILLAR_CLASSES[i]}">
          <div class="pillar-icon">${PILLAR_ICONS[i]}</div>
          <div class="pillar-num">${PILLAR_LABELS[i]}</div>
          <div class="pillar-title">${p.title}</div>
          <div class="divider"></div>
          <div class="pillar-desc">${p.description}</div>
          ${p.evidence && p.evidence.length ? `<div class="evidence-list">${evidenceItems}</div>` : ''}
        </div>`;
    } else {
      pillarsHTML += `
        <div class="pillar-card empty">
          <div class="placeholder-num">0${i+1}</div>
        </div>`;
    }
  }
  pillarsHTML += '</div>';

  let summaryHTML = '';
  const summaryData = window._lastSummary;
  if (summaryData && completedCount === 3) {
    summaryHTML = `
      <div class="summary-card">
        <h3>Relationship narrative</h3>
        <p>${summaryData}</p>
      </div>
      <button class="export-btn" onclick="window.print()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M11 5H3M11 5V11a1 1 0 01-1 1H4a1 1 0 01-1-1V5M11 5V3a1 1 0 00-1-1H4a1 1 0 00-1 1v2M9 8H5m4 3H5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        Export summary
      </button>
    `;
  }

  existing.innerHTML = headerHTML + pillarsHTML + summaryHTML;
}

async function sendMessage(userText) {
  if (isLoading || !userText.trim()) return;
  isLoading = true;
  sendBtn.disabled = true;

  addMessage('user', userText);
  conversationHistory.push({ role: 'user', content: userText });

  showTyping();

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await resp.json();
    const rawText = data.content?.map(b => b.text || '').join('') || '';

    let parsed;
    try {
      const cleaned = rawText.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(cleaned);
    } catch {
      parsed = { message: rawText, pillars: [], customerName: null, overallSummary: null };
    }

    removeTyping();

    if (parsed.customerName) customerName = parsed.customerName;
    if (parsed.pillars && parsed.pillars.length) pillarsData = parsed.pillars;
    if (parsed.overallSummary) window._lastSummary = parsed.overallSummary;

    const displayMsg = parsed.message || rawText;
    addMessage('assistant', displayMsg);
    conversationHistory.push({ role: 'assistant', content: rawText });

    updateInfoGraphic();

  } catch (err) {
    removeTyping();
    addMessage('assistant', 'Something went wrong. Please check your API connection and try again.');
    console.error(err);
  }

  isLoading = false;
  sendBtn.disabled = false;
  userInput.focus();
}

async function startConversation() {
  if (appStarted) return;
  appStarted = true;
  isLoading = true;

  showTyping();

  try {
    const initMsg = "Hello, I'm starting a new customer stickiness analysis session.";
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: initMsg }]
      })
    });

    const data = await resp.json();
    const rawText = data.content?.map(b => b.text || '').join('') || '';

    let parsed;
    try {
      const cleaned = rawText.replace(/```json|```/g, '').trim();
      parsed = JSON.parse(cleaned);
    } catch {
      parsed = { message: rawText };
    }

    removeTyping();
    addMessage('assistant', parsed.message || rawText);
    conversationHistory.push({ role: 'user', content: initMsg });
    conversationHistory.push({ role: 'assistant', content: rawText });

  } catch (err) {
    removeTyping();
    addMessage('assistant', "Welcome! I'm here to help you identify the three pillars of stickiness for your customer. Let's start — what's the name of the customer you're working with, and which product are you discussing?");
  }

  isLoading = false;
  sendBtn.disabled = false;
}

userInput.addEventListener('input', () => {
  sendBtn.disabled = !userInput.value.trim() || isLoading;
  userInput.style.height = 'auto';
  userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    const val = userInput.value.trim();
    if (val && !isLoading) {
      userInput.value = '';
      userInput.style.height = 'auto';
      sendBtn.disabled = true;
      sendMessage(val);
    }
  }
});

sendBtn.addEventListener('click', () => {
  const val = userInput.value.trim();
  if (val && !isLoading) {
    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;
    sendMessage(val);
  }
});

startConversation();
</script>
</body>
</html>
